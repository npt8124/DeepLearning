<!DOCTYPE html>
<html>
<head>
    <title>RNN Time Series</title>
</head>
<body>

<h2>Dự đoán chuỗi (RNN)</h2>

<form method="POST">
    <input type="text" name="sequence" 
           placeholder="Nhập 10 số, cách nhau bằng dấu cách"
           size="50" required>
    <br><br>
    <button type="submit">Predict</button>
</form>

{% if prediction %}
    <h3>Kết quả dự đoán: {{ prediction }}</h3>
{% endif %}

</body>
</html>
